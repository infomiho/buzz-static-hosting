<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Buzz{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.6/dist/js/all.min.js" defer></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen bg-background text-foreground">
    <header class="border-b border-border/60 bg-background/80 backdrop-blur-sm sticky top-0 z-50">
        <div class="mx-auto flex h-16 max-w-6xl items-center justify-between px-6">
            <a href="/" class="group flex items-center gap-2 hover:opacity-80 transition-opacity">
                <span class="text-xl font-bold tracking-tight">Buzz</span>
                <span class="inline-block size-1.5 rounded-full bg-primary transition-transform group-hover:scale-125"></span>
            </a>
            {% if user %}
            <div class="flex items-center gap-4">
                <span class="text-sm text-muted-foreground">{{ user.github_login }}</span>
                <form action="/dashboard/logout" method="post">
                    <button type="submit" class="btn-sm-ghost">Logout</button>
                </form>
            </div>
            {% endif %}
        </div>
    </header>
    <main class="mx-auto max-w-6xl px-6 py-10">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
